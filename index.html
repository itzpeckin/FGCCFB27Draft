function setRole(r){roleChoice=r;$('commissionerRole').classList.toggle('active',r==='commissioner');$('playerRole').classList.toggle('active',r==='player')}
async function seedFirebase(){await set(root,{users:seededUsers,picks:[],settings:{locked:false,createdAt:new Date().toISOString()},activity:[{ts:Date.now(),text:'Draft room initialized.'}]});toast('Firebase draft data initialized.');}
async function login(){const pin=$('pinInput').value.trim();if(!/^\d{4}$/.test(pin))return toast('Enter a 4 digit PIN.');const hash=await sha256(pin);const snap=await get(ref(db,'draftRoom/users'));const users=snap.val();if(roleChoice==='commissioner'&&hash===seededUsers.commissioner.pinHash){session={role:'commissioner',owner:'Peckin'};if(!users)await seedFirebase();showApp();return}if(!users)return toast('Commissioner must initialize Firebase first.');const found=Object.values(users).find(u=>u.role==='player'&&u.pinHash===hash);if(found){session={role:'player',owner:found.owner};showApp();return}toast('Invalid PIN.')}
function showApp(){$('loginScreen').classList.add('hidden');$('app').classList.remove('hidden');$('welcomeText').textContent=session.role==='commissioner'?'Commissioner Mode • Drafting as Peckin (#8)':`Player Mode • Welcome ${session.owner}`;$('adminControls').classList.toggle('hidden',session.role!=='commissioner');render();}
function logout(){session=null;$('app').classList.add('hidden');$('loginScreen').classList.remove('hidden');$('pinInput').value=''}
onValue(root,snap=>{state=snap.val()||{picks:[],settings:{locked:false},activity:[]};$('saveStatus').textContent='Live • '+new Date().toLocaleTimeString();$('saveStatus').className='pill good';if(session)render();});
async function draftTeam(name){if(!session)return;const idx=currentPick();if(idx===null)return toast('Draft is complete.');if(state.settings?.locked&&session.role!=='commissioner')return toast('Draft is locked.');const owner=draftOrder[idx];if(session.role==='player'&&session.owner!==owner)return toast(`Waiting for ${owner} to pick.`);const t=byName(name);await runTransaction(root,cur=>{cur=cur||{picks:[],settings:{locked:false},activity:[],users:seededUsers};cur.picks=cur.picks||[];cur.activity=cur.activity||[];const activePicks=cur.picks;if(activePicks.length>=draftOrder.length)return cur;if(cur.settings?.locked&&session.role!=='commissioner')return cur;if(cur.picks.find(p=>p.team===name&&!p.skipped))return cur;const pickOwner=draftOrder[cur.picks.length];if(session.role==='player'&&session.owner!==pickOwner)return cur;const pickNo=cur.picks.length+1;cur.picks.push({pick:pickNo,owner:pickOwner,team:name,ts:new Date().toISOString(),ovr:t.ovr,off:t.off,def:t.def,dpTotal:t.dpTotal});cur.activity.push({ts:Date.now(),text:`#${pickNo} ${pickOwner} selected ${name}`});return cur;});toast(`${owner} selected ${name}`)}
async function undoPick(){if(session.role!=='commissioner'||!picks().length)return;const p=picks()[picks().length-1];await update(root,{picks:picks().slice(0,-1),activity:[...(state.activity||[]),{ts:Date.now(),text:`Commissioner undid ${p.owner}'s pick of ${p.team}`}]})}
async function resetDraft(){if(session.role!=='commissioner')return;if(confirm('Reset the entire live draft for everyone?'))await update(root,{picks:[],settings:{locked:false},activity:[{ts:Date.now(),text:'Commissioner reset the draft.'}]})}
async function toggleLock(){if(session.role!=='commissioner')return;const locked=!(state.settings?.locked);await update(root,{settings:{...(state.settings||{}),locked},activity:[...(state.activity||[]),{ts:Date.now(),text:locked?'Commissioner locked the draft.':'Commissioner unlocked the draft.'}]})}
async function skipPick(){if(session.role!=='commissioner')return;const idx=currentPick();if(idx===null)return;const owner=draftOrder[idx];await update(root,{picks:[...picks(),{pick:idx+1,owner,team:'SKIPPED',ts:new Date().toISOString(),skipped:true}],activity:[...(state.activity||[]),{ts:Date.now(),text:`Commissioner skipped #${idx+1} ${owner}`}]})}
function renderStats(){const available=teams.filter(t=>!pickedTeam(t.name));const bestO=[...available].sort((a,b)=>b.ovr-a.ovr||b.off-a.off)[0];const bestDP=[...available].sort((a,b)=>b.dpTotal-a.dpTotal)[0];const cp=currentPick();$('stats').innerHTML=`<div class="stat"><div class="label">Current Pick</div><div class="value">${cp===null?'Complete':'#'+(cp+1)+' '+draftOrder[cp]}</div><div class="sub">${17-picks().length} picks remaining</div></div><div class="stat"><div class="label">Your Login</div><div class="value">${session?session.owner:'—'}</div><div class="sub">${session?session.role:'Not logged in'}</div></div><div class="stat"><div class="label">Highest OVR</div><div class="value">${bestO?bestO.ovr:'—'}</div><div class="sub">${bestO?bestO.name:'No teams left'}</div></div><div class="stat"><div class="label">Highest DP Total</div><div class="value">${bestDP?fmt(bestDP.dpTotal):'—'}</div><div class="sub">${bestDP?bestDP.name:'No teams left'}</div></div>`;$('lockStatus').textContent=state.settings?.locked?'Draft Locked':'Draft Open';$('lockStatus').className='pill '+(state.settings?.locked?'warn':'good')}
function renderDraft(){const cp=currentPick();$('draftList').innerHTML=draftOrder.map((o,i)=>{const p=picks()[i];const t=p&&!p.skipped?byName(p.team):null;return `<div class="pick ${i===cp?'current':''} ${p?'done':''} ${session&&session.owner===o?'me':''}"><div class="picknum">${i+1}</div><div><div class="owner">${o}</div><div class="selection">${p?(p.skipped?'Skipped':`<img class="miniLogo" src="${logo(t)}" onerror="this.style.display='none'"> ${p.team} • OVR ${t.ovr}`):'Waiting to pick'}</div></div></div>`}).join('')}
function renderHistory(){$('history').innerHTML=picks().length?picks().map(p=>{if(p.skipped)return `<div class="histItem"><span class="tag">#${p.pick}</span><b>${p.owner}</b><span style="color:var(--muted)">was skipped</span></div>`;const t=byName(p.team);return `<div class="histItem"><span class="tag">#${p.pick}</span><img class="miniLogo" src="${logo(t)}" onerror="this.style.display='none'"><b>${p.owner}</b><span style="color:var(--muted)">selected</span><b>${p.team}</b></div>`}).join(''):'<div style="color:var(--muted);padding:10px">No selections yet.</div>'}
function selectPreview(name){selected=byName(name);renderTeams();renderPreview();}
function renderTeams(){const pf=$('prestigeFilter').value,of=$('ovrFilter').value;let list=teams.filter(t=>(pf==='all'||String(t.prestige)===pf)&&(of==='all'||String(t.ovr)===of));list.sort((a,b)=>{let av=a[sortKey],bv=b[sortKey];if(sortKey==='name'){av=a.name;bv=b.name}if(av>bv)return sortDir==='asc'?1:-1;if(av<bv)return sortDir==='asc'?-1:1;return a.name.localeCompare(b.name)});$('teamBody').innerHTML=list.map(t=>{const drafted=pickedTeam(t.name);const active=selected&&selected.name===t.name;const safe=t.name.replace(/'/g,"\\'");return `<tr class="${drafted?'draftedRow':''} ${active?'activeRow':''}" data-team="${t.name.replace(/"/g,'&quot;')}"><td><div class="teamCell"><img class="teamLogo" src="${logo(t)}" onerror="fallback(this,'${safe}')"><div><div>${t.name}</div><div class="teamHint">${drafted?'Drafted by '+drafted.owner:'Click to preview'}</div></div></div></td><td>${t.prestige} Star</td><td class="rating ${t.ovr>=72?'high':t.ovr>=67?'mid':'low'}">OVR ${t.ovr}</td></tr>`}).join('')||'<tr><td colspan="3" style="color:var(--muted);padding:18px">No teams match your filters.</td></tr>';$('teamBody').querySelectorAll('tr[data-team]').forEach(row=>row.addEventListener('click',()=>selectPreview(row.dataset.team)));$('tableCard').classList.toggle('hideDrafted',hideDrafted)}
function renderPreview(){const t=selected||teams.find(x=>!pickedTeam(x.name))||teams[0];const drafted=pickedTeam(t.name);const idx=currentPick();const owner=idx===null?'Draft Complete':draftOrder[idx];let canDraft=!drafted&&idx!==null&&(!state.settings?.locked||session.role==='commissioner')&&(session.role==='commissioner'||session.owner===owner);$('preview').innerHTML=`<img class="largeLogo" src="${logo(t)}" onerror="fallback(this,'${t.name.replace(/'/g,"\\'")}')"><h3>${t.name}</h3><div class="prestige">Prestige ${stars(t.prestige)} &nbsp; <span style="color:var(--muted)">${t.prestige} Star</span></div><div class="metricGrid"><div class="metric"><span>OVR</span><b>${t.ovr}</b></div><div class="metric"><span>OFF</span><b>${t.off}</b></div><div class="metric"><span>DEF</span><b>${t.def}</b></div></div><div class="metricGrid"><div class="metric"><span>DP Left</span><b>${fmt(t.dpLeft)}</b></div><div class="metric"><span>DP Total</span><b>${fmt(t.dpTotal)}</b></div><div class="metric"><span>Status</span><b style="font-size:15px;color:${drafted?'var(--red)':'var(--green)'}">${drafted?'Drafted':'Available'}</b></div></div>${drafted?`<button class="btn bigPick" disabled>Drafted by ${drafted.owner}</button>`:`<button class="btn bigPick" id="draftBtn" ${canDraft?'':'disabled'}>Draft for ${owner}</button>`}<div class="smallNote">${session.role==='player'&&owner!==session.owner&&idx!==null?'Waiting for '+owner+'. ':''}${state.settings?.locked&&session.role!=='commissioner'?'Draft is locked.':''}</div>`;const b=$('draftBtn');if(b)b.onclick=()=>draftTeam(t.name)}
function renderActivity(){const a=state.activity||[];$('activity').innerHTML=a.slice(-20).reverse().map(x=>`<div class="activityItem"><b>${new Date(x.ts).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}</b><br>${x.text}</div>`).join('')||'<div style="color:var(--muted)">No activity yet.</div>'}
function render(){renderStats();renderDraft();renderHistory();renderTeams();renderPreview();renderActivity();if(session?.role==='commissioner')$('lockBtn').textContent=state.settings?.locked?'Unlock Draft':'Lock Draft'}
$('commissionerRole').onclick=()=>setRole('commissioner');$('playerRole').onclick=()=>setRole('player');$('loginBtn').onclick=login;$('pinInput').addEventListener('keydown',e=>{if(e.key==='Enter')login()});$('initBtn').onclick=seedFirebase;$('logoutBtn').onclick=logout;$('prestigeFilter').onchange=renderTeams;$('ovrFilter').onchange=renderTeams;$('clearBtn').onclick=()=>{$('prestigeFilter').value='all';$('ovrFilter').value='all';renderTeams()};document.querySelectorAll('th[data-sort]').forEach(th=>th.onclick=()=>{let k=th.dataset.sort;if(sortKey===k)sortDir=sortDir==='asc'?'desc':'asc';else{sortKey=k;sortDir=k==='name'?'asc':'desc'}renderTeams()});$('undoBtn').onclick=undoPick;$('resetBtn').onclick=resetDraft;$('lockBtn').onclick=toggleLock;$('skipBtn').onclick=skipPick;$('toggleDraftedBtn').onclick=()=>{hideDrafted=!hideDrafted;$('toggleDraftedBtn').textContent=hideDrafted?'Show Drafted':'Hide Drafted';renderTeams()};$('exportBtn').onclick=()=>{const rows=[['Pick','Owner','Team','OVR','OFF','DEF','DP Left','DP Total','Prestige'],...picks().filter(p=>!p.skipped).map(p=>{const t=byName(p.team);return[p.pick,p.owner,p.team,t.ovr,t.off,t.def,t.dpLeft,t.dpTotal,t.prestige]})];const csv=rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cfb27-draft-results.csv';a.click();URL.revokeObjectURL(a.href)};
</script></body></html>
